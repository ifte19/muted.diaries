<!DOCTYPE html>
<html>
<head>
  <title>Muted Diaries</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      padding: 40px;
      background: #1e293b;
    }
  </style>
</head>

<body>

<header>
  <h1>Muted Diaries</h1>
  <p>Photography by Iftekar Uddin</p>
  <p>Street | Moon | Abstract | Nature</p>
</header>

<section class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</section>

<footer>
  <p>Available for paid collaborations</p>
</footer>

</body>
</html>
